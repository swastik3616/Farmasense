name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    # Start background Redis for LangChain Elastic Caching tests
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install -r backend/requirements-dev.txt
        
    - name: Lint with flake8
      run: |
        cd backend
        # Stop build if syntax errors or undefined names
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Tests & Coverage Gate
      env:
        # Dummy variables for tests to bypass None checks during init
        MONGO_URI: "mongodb://dummy"
        GROQ_API_KEY: "dummy"
        MANDI_API_KEY: "dummy"
      run: |
        cd backend
        pytest tests/ --cov=app --cov-fail-under=70

    - name: Create Issue on Failure
      if: failure()
      uses: JasonEtco/create-an-issue@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        filename: .github/ISSUE_TEMPLATE/ci_failure.md
